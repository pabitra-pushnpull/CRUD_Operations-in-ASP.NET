<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Reset Password</title>
    <style>
        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }

        .login-container {
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            border: solid;
        }

            .login-container input {
                width: 90%;
                padding: 8px;
                margin: 8px 0;
            }

            .login-container button {
                width: 95%;
                padding: 10px;
                background: #4a6cf7;
                color: white;
                border: none;
                border-radius: 5px;
            }

        .links a {
            font-size: 14px;
            margin: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Forgot Password</h2>

        <form method="post">
            <input type="email" name="Email" placeholder="Enter your email" required /><br style="height:55px" />
            <a href="indexweb.aspx">Back to Login</a>
            <button type="submit">Reset Password</button>
        </form>



    </div>
</body>
</html>
